name: Get_Image_Link_UI-Arq-Dashboard
on: workflow_dispatch
jobs:
  download_image:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and Save Image
        run: |
          docker pull us-central1-docker.pkg.dev/keephq/keep/keep-arq-dashboard:latest
          docker save -o keep-arq-dashboard.tar us-central1-docker.pkg.dev/keephq/keep/keep-arq-dashboard:latest
      - name: Upload to Page
        uses: actions/upload-artifact@v4
        with:
          name: keep-arq-dashboard-image
          path: keep-arq-dashboard.tar
