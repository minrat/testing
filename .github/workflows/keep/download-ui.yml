name: Get_Image_Link_UI
on: workflow_dispatch
jobs:
  download_image:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and Save Image
        run: |
          docker pull us-central1-docker.pkg.dev/keephq/keep/keep-ui:latest
          docker save -o keep-ui.tar us-central1-docker.pkg.dev/keephq/keep/keep-ui:latest
      - name: Upload to Page
        uses: actions/upload-artifact@v4
        with:
          name: keep-ui-image
          path: keep-ui.tar
